*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif; font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #0EA5E9;
    --accent: #38BDF8;
    --neutral-dark: #0B1120;
    --neutral-mid: #1E293B;
    --text: #FFFFFF;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
}

.card {
    position: relative; width: 1080px; height: 1350px;
    overflow: hidden; word-break: keep-all;
    background: #000000;
    color: var(--text);
}

/* Stronger mesh gradient for ending */
.bg-mesh {
    position: absolute; inset: 0; z-index: 0;
    background:
        radial-gradient(ellipse at 50% 50%, rgba(14, 165, 233, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(14, 165, 233, 0.08) 0%, transparent 40%);
}

/* Watermark for ending */
.bg-watermark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-8deg);
    font-family: 'Paperlogy', sans-serif; font-weight: 900;
    font-size: 200px; color: rgba(255,255,255,0.02);
    white-space: nowrap; pointer-events: none; user-select: none;
    letter-spacing: -0.03em; z-index: 1;
}

.anchor-tl { position: absolute; top: 36px; left: 48px; font-weight: 600; font-size: 16px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; z-index: 10; }
.anchor-tr { position: absolute; top: 36px; right: 48px; font-weight: 300; font-size: 16px; color: var(--text-muted); z-index: 10; }
.anchor-bl { position: absolute; bottom: 36px; left: 48px; font-weight: 300; font-size: 14px; color: var(--text-muted); z-index: 10; }
.anchor-br { position: absolute; bottom: 36px; right: 48px; font-weight: 200; font-size: 18px; color: var(--text-muted); z-index: 10; }

.progress-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); z-index: 10; }

/* Main content - cinematic ending */
.content {
    position: relative; z-index: 5;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 50px;
    text-align: center;
}

/* Illustration */
.illust-ending {
    position: relative; margin-bottom: 24px;
}
.illust-ending img {
    width: 550px; height: auto;
    filter: drop-shadow(0 0 40px rgba(14,165,233,0.35)) drop-shadow(0 0 80px rgba(56,189,248,0.15));
}
.illust-ending .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(14,165,233,0.2) 0%, transparent 65%);
    pointer-events: none; z-index: -1;
}

/* Quote section */
.quote-mark {
    font-weight: 100; font-size: 100px; line-height: 1;
    color: rgba(255,255,255,0.12);
    margin-bottom: -10px;
}

.ending-message {
    font-weight: 300; font-size: 40px; line-height: 1.6;
    letter-spacing: -0.02em; color: rgba(255,255,255,0.9);
    max-width: 850px;
}
.ending-message strong {
    font-weight: 800; color: #FFFFFF;
}
.ending-message .accent {
    color: var(--accent); font-weight: 700;
}

/* Subtext */
.ending-sub {
    font-weight: 400; font-size: 24px; line-height: 1.6;
    color: var(--text-dim); margin-top: 28px;
    max-width: 750px;
}

/* Divider line */
.divider-line {
    width: 60px; height: 3px; background: var(--primary);
    margin: 28px auto;
    border-radius: 2px;
}

/* Brand */
.ending-brand {
    font-weight: 300; font-size: 16px;
    color: rgba(255,255,255,0.25); letter-spacing: 0.12em;
    text-transform: uppercase;
}
</style>
</head>
<body>
<div class="card">
    <div class="bg-mesh"></div>
    <div class="bg-watermark">FUTURE</div>
    <div class="progress-bar"></div>

    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600; color:var(--text);">05</span><span> / 05</span></div>
    <div class="anchor-bl">2026.03</div>
    <div class="anchor-br">+</div>

    <div class="content">
        <div class="illust-ending">
            <div class="glow"></div>
            <img src="./images/card5_future.png" alt="AI Future">
        </div>

        <div class="quote-mark">"</div>

        <p class="ending-message">
            AI는 <span class="accent">도구</span>입니다<br>
            <strong>어떻게 쓸지</strong>는<br>
            우리가 결정합니다
        </p>

        <p class="ending-sub">
            AI를 이해하는 것은 미래를 준비하는 첫걸음입니다.<br>
            두려워하지 말고, 함께 만들어 가면 됩니다.
        </p>

        <div class="divider-line"></div>

        <div class="ending-brand">AI EXPLAINED SERIES</div>
    </div>
</div>
</body>
