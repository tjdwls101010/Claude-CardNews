*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif; font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #0EA5E9;
    --accent: #38BDF8;
    --neutral-dark: #0B1120;
    --neutral-mid: #1E293B;
    --text: #FFFFFF;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
}

.card {
    position: relative; width: 1080px; height: 1350px;
    overflow: hidden; word-break: keep-all;
    background: var(--neutral-dark);
    color: var(--text);
}

.bg-mesh {
    position: absolute; inset: 0; z-index: 0;
    background:
        radial-gradient(ellipse at 70% 25%, rgba(14, 165, 233, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(56, 189, 248, 0.12) 0%, transparent 50%);
}

.bg-watermark {
    position: absolute; bottom: -30px; right: -20px;
    font-family: 'Paperlogy', sans-serif; font-weight: 900;
    font-size: 220px; color: rgba(255,255,255,0.025);
    white-space: nowrap; pointer-events: none; user-select: none;
    letter-spacing: -0.03em; z-index: 1; line-height: 1;
}

.anchor-tl { position: absolute; top: 36px; left: 48px; font-weight: 600; font-size: 16px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; z-index: 10; }
.anchor-tr { position: absolute; top: 36px; right: 48px; font-weight: 300; font-size: 16px; color: var(--text-muted); z-index: 10; }
.anchor-bl { position: absolute; bottom: 36px; left: 48px; font-weight: 300; font-size: 14px; color: var(--text-muted); z-index: 10; }
.anchor-br { position: absolute; bottom: 36px; right: 48px; font-weight: 200; font-size: 18px; color: var(--text-muted); z-index: 10; }

.progress-bar { position: absolute; top: 0; left: 0; width: 40%; height: 4px; background: var(--primary); z-index: 10; }

/* Content */
.content {
    position: relative; z-index: 5;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 48px 50px;
}

/* Step indicator */
.step-label {
    margin-top: 56px;
    display: flex; align-items: center; gap: 12px;
}
.step-number {
    font-weight: 900; font-size: 52px; color: var(--primary);
    letter-spacing: -0.03em; line-height: 1;
}
.step-text {
    font-weight: 500; font-size: 20px; color: var(--text-dim);
    letter-spacing: 0.02em;
}

/* Title */
.title-main {
    font-weight: 900; font-size: 72px; line-height: 1.18;
    letter-spacing: -0.04em; color: var(--text);
    margin-top: 16px;
}
.title-main .highlight { color: var(--accent); }

/* Illustration - overlapping with text */
.illust-container {
    position: relative; flex: 1; display: flex;
    justify-content: center; align-items: center;
    margin: -10px -50px 0 -50px; /* edge-to-edge */
}
.illust-container img {
    width: 580px; height: auto;
    filter: drop-shadow(0 0 35px rgba(14,165,233,0.25)) drop-shadow(0 0 70px rgba(56,189,248,0.12));
}
.illust-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 450px; height: 450px; border-radius: 50%;
    background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 70%);
    pointer-events: none;
}

/* Description area - glass panel overlapping illustration */
.desc-panel {
    position: relative; z-index: 8;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 32px 36px;
    margin-top: -60px; /* overlap with illustration */
    margin-bottom: 24px;
}
.desc-title {
    font-weight: 700; font-size: 28px; color: var(--text);
    margin-bottom: 16px; letter-spacing: -0.02em;
}
.desc-text {
    font-weight: 400; font-size: 24px; line-height: 1.7;
    color: var(--text-dim);
}
.desc-text .em { color: var(--text); font-weight: 600; }

/* Keyword chips */
.keyword-row {
    display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
}
.chip {
    display: inline-flex; align-items: center;
    padding: 8px 20px; border-radius: 100px;
    background: rgba(14, 165, 233, 0.12);
    border: 1px solid rgba(14, 165, 233, 0.25);
    font-weight: 600; font-size: 18px; color: var(--accent);
    letter-spacing: 0.01em;
}
</style>
</head>
<body>
<div class="card">
    <div class="bg-mesh"></div>
    <div class="bg-watermark">DATA</div>
    <div class="progress-bar"></div>

    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600; color:var(--text);">02</span><span> / 05</span></div>
    <div class="anchor-bl">2026.03</div>
    <div class="anchor-br">+</div>

    <div class="content">
        <div class="step-label">
            <span class="step-number">01</span>
            <span class="step-text">STEP ONE</span>
        </div>

        <h1 class="title-main">
            AI는 <span class="highlight">데이터</span>를<br>
            먹고 자랍니다
        </h1>

        <div class="illust-container">
            <div class="illust-glow"></div>
            <img src="./images/card2_funnel.png" alt="Data Funnel">
        </div>

        <div class="desc-panel">
            <div class="desc-title">사람도 경험으로 배우듯, AI도 데이터로 배웁니다</div>
            <div class="desc-text">
                <span class="em">사진, 글, 숫자, 소리</span> 등 수많은 정보를 AI에게 보여주면,
                AI는 그 속에서 <span class="em">공통된 규칙</span>을 스스로 찾아냅니다.
            </div>
            <div class="keyword-row">
                <span class="chip">사진</span>
                <span class="chip">텍스트</span>
                <span class="chip">소리</span>
                <span class="chip">숫자</span>
            </div>
        </div>
    </div>
</div>
</body>
