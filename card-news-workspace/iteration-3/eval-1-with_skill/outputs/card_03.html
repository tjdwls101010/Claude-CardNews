*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif; font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #0EA5E9;
    --accent: #38BDF8;
    --neutral-dark: #0B1120;
    --neutral-mid: #1E293B;
    --text: #FFFFFF;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
}

.card {
    position: relative; width: 1080px; height: 1350px;
    overflow: hidden; word-break: keep-all;
    background: var(--neutral-dark);
    color: var(--text);
}

.bg-mesh {
    position: absolute; inset: 0; z-index: 0;
    background:
        radial-gradient(ellipse at 30% 60%, rgba(14, 165, 233, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(56, 189, 248, 0.1) 0%, transparent 45%);
}

.bg-watermark {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Paperlogy', sans-serif; font-weight: 900;
    font-size: 180px; color: rgba(255,255,255,0.025);
    white-space: nowrap; pointer-events: none; user-select: none;
    letter-spacing: -0.03em; z-index: 1;
}

.anchor-tl { position: absolute; top: 36px; left: 48px; font-weight: 600; font-size: 16px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; z-index: 10; }
.anchor-tr { position: absolute; top: 36px; right: 48px; font-weight: 300; font-size: 16px; color: var(--text-muted); z-index: 10; }
.anchor-bl { position: absolute; bottom: 36px; left: 48px; font-weight: 300; font-size: 14px; color: var(--text-muted); z-index: 10; }
.anchor-br { position: absolute; bottom: 36px; right: 48px; font-weight: 200; font-size: 18px; color: var(--text-muted); z-index: 10; }

.progress-bar { position: absolute; top: 0; left: 0; width: 60%; height: 4px; background: var(--primary); z-index: 10; }

.content {
    position: relative; z-index: 5;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 48px 50px;
}

.step-label {
    margin-top: 56px;
    display: flex; align-items: center; gap: 12px;
}
.step-number { font-weight: 900; font-size: 52px; color: var(--primary); letter-spacing: -0.03em; line-height: 1; }
.step-text { font-weight: 500; font-size: 20px; color: var(--text-dim); letter-spacing: 0.02em; }

.title-main {
    font-weight: 900; font-size: 72px; line-height: 1.18;
    letter-spacing: -0.04em; color: var(--text);
    margin-top: 16px;
}
.title-main .highlight { color: var(--accent); }

/* Illustration integrated section */
.middle-section {
    flex: 1; display: flex; align-items: center;
    position: relative; margin: 0 -50px; /* edge-to-edge */
}

/* Left illustration */
.illust-left {
    flex: 0 0 520px; display: flex; justify-content: center; align-items: center;
    position: relative;
}
.illust-left img {
    width: 500px; height: auto;
    filter: drop-shadow(0 0 30px rgba(14,165,233,0.25)) drop-shadow(0 0 60px rgba(56,189,248,0.1));
}
.illust-left .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 70%);
    pointer-events: none;
}

/* Right explanation */
.explain-right {
    flex: 1; padding: 0 50px 0 10px;
}

/* Step cards */
.step-cards {
    display: flex; flex-direction: column; gap: 20px;
}
.step-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px 28px;
    display: flex; gap: 16px; align-items: flex-start;
}
.step-card-icon {
    flex-shrink: 0;
    width: 48px; height: 48px; border-radius: 12px;
    background: rgba(14, 165, 233, 0.15);
    display: flex; justify-content: center; align-items: center;
    font-weight: 800; font-size: 22px; color: var(--accent);
}
.step-card-content { flex: 1; }
.step-card-title {
    font-weight: 700; font-size: 24px; color: var(--text);
    margin-bottom: 6px; letter-spacing: -0.02em;
}
.step-card-desc {
    font-weight: 400; font-size: 20px; line-height: 1.6; color: var(--text-dim);
}

/* Bottom summary */
.bottom-summary {
    background: rgba(14, 165, 233, 0.1);
    border: 1px solid rgba(14, 165, 233, 0.2);
    border-radius: 16px;
    padding: 24px 32px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
}
.summary-icon {
    font-size: 36px; flex-shrink: 0;
}
.summary-text {
    font-weight: 500; font-size: 24px; line-height: 1.5; color: var(--text);
}
.summary-text .dim { color: var(--text-dim); font-weight: 400; }
</style>
</head>
<body>
<div class="card">
    <div class="bg-mesh"></div>
    <div class="bg-watermark">LEARNING</div>
    <div class="progress-bar"></div>

    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600; color:var(--text);">03</span><span> / 05</span></div>
    <div class="anchor-bl">2026.03</div>
    <div class="anchor-br">+</div>

    <div class="content">
        <div class="step-label">
            <span class="step-number">02</span>
            <span class="step-text">STEP TWO</span>
        </div>

        <h1 class="title-main">
            <span class="highlight">규칙</span>을 찾아<br>
            스스로 배웁니다
        </h1>

        <div class="middle-section">
            <div class="illust-left">
                <div class="glow"></div>
                <img src="./images/card3_learning.png" alt="AI Learning">
            </div>
            <div class="explain-right">
                <div class="step-cards">
                    <div class="step-card">
                        <div class="step-card-icon">1</div>
                        <div class="step-card-content">
                            <div class="step-card-title">데이터 관찰</div>
                            <div class="step-card-desc">수천, 수만 개의 예시를 반복해서 봅니다</div>
                        </div>
                    </div>
                    <div class="step-card">
                        <div class="step-card-icon">2</div>
                        <div class="step-card-content">
                            <div class="step-card-title">패턴 발견</div>
                            <div class="step-card-desc">"이런 모양이면 고양이구나" 같은 규칙을 찾아요</div>
                        </div>
                    </div>
                    <div class="step-card">
                        <div class="step-card-icon">3</div>
                        <div class="step-card-content">
                            <div class="step-card-title">실수하고 고치기</div>
                            <div class="step-card-desc">틀리면 다시 조정하며 점점 정확해집니다</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-summary">
            <div class="summary-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="16" stroke="#38BDF8" stroke-width="2" fill="rgba(14,165,233,0.1)"/>
                    <path d="M12 18l4 4 8-8" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="summary-text">
                <span class="dim">이 과정을</span> 수백만 번 반복<span class="dim">하면<br>사람처럼 판단할 수 있게 됩니다</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
