*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif; font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #0EA5E9;
    --accent: #38BDF8;
    --neutral-dark: #0B1120;
    --neutral-mid: #1E293B;
    --text: #FFFFFF;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
}

.card {
    position: relative; width: 1080px; height: 1350px;
    overflow: hidden; word-break: keep-all;
    background: var(--neutral-dark);
    color: var(--text);
}

/* Mesh gradient background */
.bg-mesh {
    position: absolute; inset: 0; z-index: 0;
    background:
        radial-gradient(ellipse at 25% 35%, rgba(14, 165, 233, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 65%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(14, 165, 233, 0.1) 0%, transparent 45%);
}

/* Background watermark */
.bg-watermark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-family: 'Paperlogy', sans-serif; font-weight: 900;
    font-size: 200px; color: rgba(255,255,255,0.03);
    white-space: nowrap; pointer-events: none; user-select: none;
    letter-spacing: -0.03em; z-index: 1;
}

/* Corner anchors */
.anchor-tl { position: absolute; top: 36px; left: 48px; font-weight: 600; font-size: 16px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; z-index: 10; }
.anchor-tr { position: absolute; top: 36px; right: 48px; font-weight: 300; font-size: 16px; color: var(--text-muted); z-index: 10; }
.anchor-bl { position: absolute; bottom: 36px; left: 48px; font-weight: 300; font-size: 14px; color: var(--text-muted); z-index: 10; }
.anchor-br { position: absolute; bottom: 36px; right: 48px; font-weight: 200; font-size: 18px; color: var(--text-muted); z-index: 10; }

/* Progress bar at top */
.progress-bar {
    position: absolute; top: 0; left: 0; width: 20%; height: 4px;
    background: var(--primary); z-index: 10;
}

/* Main content */
.content {
    position: relative; z-index: 5;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 48px 50px;
}

/* Tag */
.tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 18px; letter-spacing: 0.04em;
    color: var(--accent); margin-top: 60px;
}
.tag::before {
    content: ''; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent);
}

/* Title area */
.title-area {
    margin-top: 24px; flex-shrink: 0;
}
.title-main {
    font-weight: 900; font-size: 76px; line-height: 1.15;
    letter-spacing: -0.04em; color: var(--text);
}
.title-main .highlight {
    color: var(--accent);
}
.subtitle {
    font-weight: 400; font-size: 30px; line-height: 1.5;
    color: var(--text-dim); margin-top: 20px;
}

/* Illustration area */
.illust-area {
    flex: 1; display: flex; justify-content: center; align-items: center;
    position: relative; margin-top: -10px;
}
.illust-area img {
    width: 620px; height: auto;
    filter: drop-shadow(0 0 40px rgba(14,165,233,0.3)) drop-shadow(0 0 80px rgba(56,189,248,0.15));
    position: relative; z-index: 5;
}

/* Glow behind illustration */
.illust-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(14,165,233,0.2) 0%, transparent 70%);
    z-index: 2; pointer-events: none;
}

/* Bottom tagline */
.bottom-tagline {
    font-weight: 300; font-size: 22px; color: var(--text-muted);
    text-align: center; margin-bottom: 20px;
    letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="card">
    <!-- Background layers -->
    <div class="bg-mesh"></div>
    <div class="bg-watermark">ARTIFICIAL INTELLIGENCE</div>
    <div class="progress-bar"></div>

    <!-- Corner anchors -->
    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600; color:var(--text);">01</span><span> / 05</span></div>
    <div class="anchor-bl">2026.03</div>
    <div class="anchor-br">+</div>

    <!-- Main content -->
    <div class="content">
        <div class="tag">TECHNOLOGY</div>

        <div class="title-area">
            <h1 class="title-main">
                <span class="highlight">AI</span>는 사실<br>
                사람을 흉내 내는<br>
                기계입니다
            </h1>
            <p class="subtitle">어렵지 않아요, 5장이면 충분합니다</p>
        </div>

        <div class="illust-area">
            <div class="illust-glow"></div>
            <img src="./images/card1_robot.png" alt="AI Robot">
        </div>

        <div class="bottom-tagline">쉬운 말로 풀어보는 인공지능의 세계</div>
    </div>
</div>
</body>
</html>
