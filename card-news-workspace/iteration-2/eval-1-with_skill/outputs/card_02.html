*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #00E5FF;
    --accent: #00BCD4;
    --bg: #0A0A12;
    --surface: #12121E;
    --text: #FFFFFF;
    --text-dim: #888888;
    --text-muted: #555555;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    word-break: keep-all;
    line-height: 1.5;
}

/* Background watermark */
.bg-watermark {
    position: absolute;
    bottom: -30px;
    right: -20px;
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 200px;
    color: rgba(255, 255, 255, 0.03);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
    line-height: 1;
}

/* Mesh gradient */
.mesh-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image:
        radial-gradient(ellipse at 70% 30%, rgba(0, 229, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 30% 70%, rgba(0, 188, 212, 0.06) 0%, transparent 50%);
}

/* Progress bar */
.progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    z-index: 20;
}

/* Corner anchors */
.anchor-tl {
    position: absolute;
    top: 40px;
    left: 48px;
    font-weight: 600;
    font-size: 16px;
    color: var(--text-dim);
    z-index: 10;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.anchor-tr {
    position: absolute;
    top: 40px;
    right: 48px;
    font-weight: 300;
    font-size: 16px;
    color: var(--text-dim);
    z-index: 10;
}

.anchor-bl {
    position: absolute;
    bottom: 40px;
    left: 48px;
    font-weight: 300;
    font-size: 14px;
    color: var(--text-muted);
    z-index: 10;
}

.anchor-br {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-weight: 200;
    font-size: 22px;
    color: var(--text-muted);
    z-index: 10;
}

/* Main layout: top title + center illustration + bottom text */
.content-wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 100px 72px 100px;
}

/* Step indicator */
.step-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(0, 229, 255, 0.12);
    border: 1px solid rgba(0, 229, 255, 0.25);
    font-weight: 800;
    font-size: 20px;
    color: var(--primary);
}

.step-label {
    font-weight: 500;
    font-size: 18px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

/* Section title */
.section-title {
    font-weight: 800;
    font-size: 48px;
    line-height: 1.25;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 16px;
}

.section-title .highlight {
    color: var(--primary);
}

.section-subtitle {
    font-weight: 400;
    font-size: 22px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 40px;
    max-width: 600px;
}

/* Illustration area */
.illust-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.illustration {
    width: 400px;
    height: 400px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
}

/* Radial glow behind illustration */
.illust-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 229, 255, 0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* Bottom explanation with glass card */
.bottom-section {
    margin-top: auto;
}

.glass-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 36px 40px;
}

.glass-card .analogy-title {
    font-weight: 700;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 12px;
}

.glass-card .analogy-title .icon {
    color: var(--primary);
    margin-right: 8px;
}

.glass-card .analogy-text {
    font-weight: 400;
    font-size: 22px;
    line-height: 1.7;
    color: var(--text-dim);
}

.glass-card .analogy-text .em {
    color: var(--text);
    font-weight: 700;
}

/* Decorative */
.deco-dots {
    position: absolute;
    display: grid;
    grid-template-columns: repeat(3, 6px);
    gap: 8px;
    z-index: 1;
}

.deco-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(0, 229, 255, 0.15);
}

</style>
</head>
<body>
<div class="card">
    <!-- Background -->
    <div class="mesh-bg"></div>
    <div class="bg-watermark">INPUT</div>

    <!-- Progress bar (2/5 = 40%) -->
    <div class="progress-bar" style="width: 40%;"></div>

    <!-- Corner anchors -->
    <div class="anchor-tl">AI Guide</div>
    <div class="anchor-tr"><span style="font-weight:600; color: var(--text);">02</span><span style="color: var(--text-dim);"> / 05</span></div>
    <div class="anchor-bl">STEP 1 OF 3</div>
    <div class="anchor-br">+</div>

    <!-- Decorative dots -->
    <div class="deco-dots" style="top: 120px; right: 120px;">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <!-- Main content -->
    <div class="content-wrapper">
        <!-- Top: title area -->
        <div class="step-badge">
            <span class="step-number">1</span>
            <span class="step-label">Data Input</span>
        </div>
        <h2 class="section-title">
            AI의 밥은<br><span class="highlight">데이터</span>입니다
        </h2>
        <p class="section-subtitle">
            <span style="color: var(--text-dim);">사람이 경험으로 배우듯,</span>
            AI도 수많은 정보를 먹고 자랍니다
        </p>

        <!-- Center: illustration -->
        <div class="illust-area">
            <div class="illust-glow"></div>
            <img class="illustration" src="./images/card2_nobg.png" alt="Data funnel">
        </div>

        <!-- Bottom: glass panel explanation -->
        <div class="bottom-section">
            <div class="glass-card">
                <div class="analogy-title">
                    <span class="icon">&#9679;</span>쉽게 말하면?
                </div>
                <div class="analogy-text">
                    AI에게 <span class="em">글, 사진, 소리</span>를 잔뜩 보여주면<br>
                    이것들 속에서 <span class="em">규칙과 패턴</span>을 스스로 찾아냅니다
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
