*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #00E5FF;
    --accent: #00BCD4;
    --bg: #0A0A12;
    --surface: #12121E;
    --text: #FFFFFF;
    --text-dim: #888888;
    --text-muted: #555555;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    word-break: keep-all;
    line-height: 1.5;
}

/* Background watermark */
.bg-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-10deg);
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 220px;
    color: rgba(255, 255, 255, 0.03);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
}

/* Mesh gradient background */
.mesh-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image:
        radial-gradient(ellipse at 20% 80%, rgba(0, 229, 255, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 188, 212, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 229, 255, 0.04) 0%, transparent 60%);
}

/* Corner anchors */
.anchor-tl {
    position: absolute;
    top: 40px;
    left: 48px;
    font-weight: 600;
    font-size: 16px;
    color: var(--text-dim);
    z-index: 10;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.anchor-tr {
    position: absolute;
    top: 40px;
    right: 48px;
    font-weight: 300;
    font-size: 16px;
    color: var(--text-dim);
    z-index: 10;
}

.anchor-bl {
    position: absolute;
    bottom: 40px;
    left: 48px;
    font-weight: 300;
    font-size: 14px;
    color: var(--text-muted);
    z-index: 10;
}

.anchor-br {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-weight: 200;
    font-size: 22px;
    color: var(--text-muted);
    z-index: 10;
}

/* Progress bar */
.progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    z-index: 20;
}

/* Main content */
.content-wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 72px;
}

.tag {
    display: inline-block;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--primary);
    padding: 8px 24px;
    border: 1px solid rgba(0, 229, 255, 0.3);
    border-radius: 100px;
    margin-bottom: 48px;
    background: rgba(0, 229, 255, 0.06);
}

.illustration {
    width: 420px;
    height: 420px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
    margin-bottom: 48px;
}

.title {
    font-weight: 900;
    font-size: 68px;
    line-height: 1.15;
    letter-spacing: -0.04em;
    text-align: center;
    color: var(--text);
    margin-bottom: 28px;
}

.title .highlight {
    color: var(--primary);
}

.subtitle {
    font-weight: 400;
    font-size: 26px;
    line-height: 1.6;
    color: var(--text-dim);
    text-align: center;
    max-width: 700px;
}

/* Decorative elements */
.deco-line {
    position: absolute;
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.2), transparent);
    z-index: 1;
}

.deco-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 255, 0.08);
    z-index: 1;
    pointer-events: none;
}

</style>
</head>
<body>
<div class="card">
    <!-- Background layers -->
    <div class="mesh-bg"></div>
    <div class="bg-watermark">ARTIFICIAL</div>

    <!-- Progress bar (1/5 = 20%) -->
    <div class="progress-bar" style="width: 20%;"></div>

    <!-- Corner anchors -->
    <div class="anchor-tl">AI Guide</div>
    <div class="anchor-tr"><span style="font-weight:600; color: var(--text);">01</span><span style="color: var(--text-dim);"> / 05</span></div>
    <div class="anchor-bl">2026.03</div>
    <div class="anchor-br">+</div>

    <!-- Decorative elements -->
    <div class="deco-line" style="right: 140px; top: 100px;"></div>
    <div class="deco-line" style="left: 100px; bottom: 80px;"></div>
    <div class="deco-circle" style="width: 300px; height: 300px; top: -80px; right: -60px;"></div>
    <div class="deco-circle" style="width: 180px; height: 180px; bottom: 120px; left: -40px;"></div>

    <!-- Main content -->
    <div class="content-wrapper">
        <div class="tag">AI 101</div>
        <img class="illustration" src="./images/card1_nobg.png" alt="AI Robot">
        <h1 class="title">
            <span class="highlight">AI</span>는 어떻게<br>생각할까?
        </h1>
        <p class="subtitle">어려운 말 없이, 5분이면 이해하는 AI 이야기</p>
    </div>
</div>
</body>
