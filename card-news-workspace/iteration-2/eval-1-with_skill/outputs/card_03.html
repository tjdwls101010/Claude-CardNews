*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
}

:root {
    --primary: #00E5FF;
    --accent: #00BCD4;
    --bg: #0A0A12;
    --surface: #12121E;
    --text: #FFFFFF;
    --text-dim: #888888;
    --text-muted: #555555;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    word-break: keep-all;
    line-height: 1.5;
}

/* Background watermark */
.bg-watermark {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-8deg);
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 180px;
    color: rgba(255, 255, 255, 0.025);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
}

/* Mesh gradient */
.mesh-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image:
        radial-gradient(ellipse at 50% 40%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 188, 212, 0.06) 0%, transparent 50%);
}

/* Progress bar */
.progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    z-index: 20;
}

/* Corner anchors */
.anchor-tl {
    position: absolute;
    top: 40px;
    left: 48px;
    font-weight: 600;
    font-size: 16px;
    color: var(--text-dim);
    z-index: 10;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.anchor-tr {
    position: absolute;
    top: 40px;
    right: 48px;
    font-weight: 300;
    font-size: 16px;
    color: var(--text-dim);
    z-index: 10;
}

.anchor-bl {
    position: absolute;
    bottom: 40px;
    left: 48px;
    font-weight: 300;
    font-size: 14px;
    color: var(--text-muted);
    z-index: 10;
}

.anchor-br {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-weight: 200;
    font-size: 22px;
    color: var(--text-muted);
    z-index: 10;
}

/* Layout: LR split */
.content-wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    padding: 100px 60px 100px;
    gap: 0;
}

/* Top area spanning both columns */
.top-area {
    grid-column: 1 / -1;
    margin-bottom: 24px;
}

.step-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(0, 229, 255, 0.12);
    border: 1px solid rgba(0, 229, 255, 0.25);
    font-weight: 800;
    font-size: 20px;
    color: var(--primary);
}

.step-label {
    font-weight: 500;
    font-size: 18px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.section-title {
    font-weight: 800;
    font-size: 48px;
    line-height: 1.25;
    letter-spacing: -0.04em;
    color: var(--text);
}

.section-title .highlight {
    color: var(--primary);
}

/* Left: illustration */
.left-area {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.illustration {
    width: 420px;
    height: 420px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
}

.illust-glow {
    position: absolute;
    width: 460px;
    height: 460px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 229, 255, 0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* Right: explanation cards stacked */
.right-area {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    padding-left: 16px;
}

.info-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 16px;
    padding: 28px 32px;
}

.info-card .card-number {
    font-weight: 900;
    font-size: 42px;
    color: rgba(0, 229, 255, 0.15);
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 8px;
}

.info-card .card-title {
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 8px;
}

.info-card .card-desc {
    font-weight: 400;
    font-size: 19px;
    line-height: 1.6;
    color: var(--text-dim);
}

.info-card .card-desc .em {
    color: var(--text);
    font-weight: 600;
}

/* Accent border for active card */
.info-card.active {
    border-left: 3px solid var(--primary);
    background: rgba(0, 229, 255, 0.04);
}

/* Decorative line */
.deco-vline {
    position: absolute;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.15), transparent);
    z-index: 1;
}

</style>

<body>
<div class="card">
    <!-- Background -->
    <div class="mesh-bg"></div>
    <div class="bg-watermark">LEARNING</div>

    <!-- Progress bar (3/5 = 60%) -->
    <div class="progress-bar" style="width: 60%;"></div>

    <!-- Corner anchors -->
    <div class="anchor-tl">AI Guide</div>
    <div class="anchor-tr"><span style="font-weight:600; color: var(--text);">03</span><span style="color: var(--text-dim);"> / 05</span></div>
    <div class="anchor-bl">STEP 2 OF 3</div>
    <div class="anchor-br">+</div>

    <!-- Decorative -->
    <div class="deco-vline" style="left: 50%; top: 120px; height: 100px;"></div>

    <!-- Main content -->
    <div class="content-wrapper">
        <!-- Top: title -->
        <div class="top-area">
            <div class="step-badge">
                <span class="step-number">2</span>
                <span class="step-label">Learning</span>
            </div>
            <h2 class="section-title">
                AI는 <span class="highlight">반복 연습</span>으로 똑똑해집니다
            </h2>
        </div>

        <!-- Left: illustration -->
        <div class="left-area">
            <div class="illust-glow"></div>
            <img class="illustration" src="./images/card3_nobg.png" alt="Learning from books">
        </div>

        <!-- Right: explanation cards -->
        <div class="right-area">
            <div class="info-card">
                <div class="card-number">01</div>
                <div class="card-title">패턴 찾기</div>
                <div class="card-desc">
                    <span style="color: var(--text-dim);">고양이 사진 수천 장을 보면</span><br>
                    <span class="em">"뾰족한 귀 + 수염"</span><span style="color: var(--text-dim);">이라는<br>규칙을 스스로 발견합니다</span>
                </div>
            </div>
            <div class="info-card active">
                <div class="card-number">02</div>
                <div class="card-title">시행착오</div>
                <div class="card-desc">
                    <span style="color: var(--text-dim);">틀린 답을 낼 때마다</span>
                    <span class="em">조금씩 방법을 수정</span><span style="color: var(--text-dim);">하며<br>점점 정확해집니다</span>
                </div>
            </div>
            <div class="info-card">
                <div class="card-number">03</div>
                <div class="card-title">결과: 전문가급 실력</div>
                <div class="card-desc">
                    <span style="color: var(--text-dim);">이 과정을</span> <span class="em">수억 번</span> <span style="color: var(--text-dim);">반복하면<br>사람처럼 판단하는 AI가 탄생합니다</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
