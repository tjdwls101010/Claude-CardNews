*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root {
    --color-primary: #F5C518;
    --color-accent: #FFD95A;
    --color-bg: #0A1628;
    --color-surface: #111D33;
    --color-text: #FFFFFF;
    --color-text-dim: #888888;
    --color-text-muted: #555555;
    --color-navy: #0A1628;
    --pad: 40px;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--color-bg);
    word-break: keep-all;
}

/* Background photo */
.bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.45) saturate(0.7) contrast(1.15);
    z-index: 0;
}

/* Gradient overlay -- smooth cinematic transition from visible photo to text area */
.gradient-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to top,
        rgba(10, 22, 40, 0.97) 0%,
        rgba(10, 22, 40, 0.92) 22%,
        rgba(10, 22, 40, 0.65) 40%,
        rgba(10, 22, 40, 0.25) 58%,
        rgba(10, 22, 40, 0.1) 72%,
        rgba(10, 22, 40, 0.35) 100%
    );
    z-index: 1;
}

/* Vignette */
.vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10,22,40,0.5) 100%);
    z-index: 2;
    pointer-events: none;
}

/* Corner anchors */
.anchor-tl {
    position: absolute;
    top: 36px;
    left: var(--pad);
    font-weight: 600;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 10;
}

.anchor-tr {
    position: absolute;
    top: 36px;
    right: var(--pad);
    font-weight: 300;
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    z-index: 10;
}

.anchor-bl {
    position: absolute;
    bottom: 36px;
    left: var(--pad);
    font-weight: 300;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    z-index: 10;
}

.anchor-br {
    position: absolute;
    bottom: 36px;
    right: var(--pad);
    font-weight: 200;
    font-size: 22px;
    color: rgba(255,255,255,0.25);
    z-index: 10;
}

/* Watermark */
.watermark {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-8deg);
    font-weight: 900;
    font-size: 160px;
    color: rgba(255,255,255,0.025);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
    z-index: 3;
}

/* Content area */
.content {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: var(--pad);
    padding-bottom: 52px;
    z-index: 5;
}

/* Top decorative quote mark */
.quote-mark {
    position: absolute;
    top: 100px;
    left: var(--pad);
    font-weight: 100;
    font-size: 160px;
    color: rgba(245, 197, 24, 0.15);
    line-height: 1;
    z-index: 5;
}

/* Summary strip -- 3 keywords at top */
.keyword-strip {
    position: absolute;
    top: 80px;
    left: var(--pad);
    right: var(--pad);
    display: flex;
    gap: 12px;
    z-index: 5;
}

.keyword-pill {
    background: rgba(245, 197, 24, 0.12);
    border: 1px solid rgba(245, 197, 24, 0.25);
    border-radius: 100px;
    padding: 10px 22px;
    font-weight: 600;
    font-size: 18px;
    color: var(--color-primary);
    letter-spacing: 0.02em;
}

/* Vision statement */
.vision {
    font-weight: 300;
    font-size: 50px;
    line-height: 1.4;
    color: var(--color-text);
    letter-spacing: -0.02em;
    margin-bottom: 20px;
}

.vision strong {
    font-weight: 800;
    color: var(--color-primary);
}

/* CTA section */
.cta-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.cta-line {
    font-weight: 500;
    font-size: 26px;
    line-height: 1.5;
    color: rgba(255,255,255,0.65);
}

.cta-line .hl {
    color: var(--color-text);
    font-weight: 700;
}

/* Accent divider */
.accent-divider {
    width: 60px;
    height: 4px;
    background: var(--color-primary);
    margin-bottom: 18px;
    border-radius: 2px;
}

/* Attribution */
.attribution {
    margin-top: 16px;
    font-weight: 500;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.02em;
}

.attribution .name {
    color: var(--color-text);
    font-weight: 700;
}

/* Bottom brand bar */
.brand-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(to right, var(--color-primary), transparent);
    z-index: 10;
}

</style>
</head>
<body>

<div class="card">
    <!-- Background photo (crowd rally) -->
    <img class="bg-photo" src="./images/card3_bg.png" alt="">
    <div class="gradient-overlay"></div>
    <div class="vignette"></div>

    <!-- Watermark -->
    <div class="watermark">ACTION</div>

    <!-- Keyword pills at top -->
    <div class="keyword-strip">
        <div class="keyword-pill">중대선거구제</div>
        <div class="keyword-pill">비례대표 확대</div>
        <div class="keyword-pill">결선투표제</div>
    </div>

    <!-- Corner anchors -->
    <div class="anchor-tl">조국혁신당</div>
    <div class="anchor-tr"><span style="font-weight:600; color:rgba(255,255,255,0.6);">03</span><span style="color:rgba(255,255,255,0.3);"> / 03</span></div>
    <div class="anchor-bl">함께하는 정치개혁</div>
    <div class="anchor-br">+</div>

    <!-- Decorative quote mark -->
    <div class="quote-mark">"</div>

    <!-- Main content -->
    <div class="content">
        <div class="accent-divider"></div>

        <div class="vision">
            정치개혁은<br>
            더 이상 미룰 수 없는<br>
            <strong>국민의 명령입니다</strong>
        </div>

        <div class="cta-section">
            <div class="cta-line">
                민주주의의 뿌리를 더욱 단단하게,<br>
                <span class="hl">조국혁신당은 정치개혁을 반드시 완수하겠습니다.</span>
            </div>
            <div class="cta-line" style="font-size: 23px; color: rgba(255,255,255,0.45);">
                개혁에 관심 있는 누구나, 이 여정에 힘을 보태주십시오.
            </div>
        </div>

        <div class="attribution">
            <span class="name">이해민</span> | 조국혁신당 사무총장
        </div>
    </div>

    <!-- Bottom accent bar -->
    <div class="brand-bar"></div>
</div>

</body>
