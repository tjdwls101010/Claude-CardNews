*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root {
    --color-primary: #F5C518;
    --color-accent: #FFD95A;
    --color-bg: #0A1628;
    --color-surface: #111D33;
    --color-text: #FFFFFF;
    --color-text-dim: #888888;
    --color-text-muted: #555555;
    --color-navy: #0A1628;
    --pad: 40px;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--color-bg);
    word-break: keep-all;
}

/* Background photo */
.bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

/* Dark gradient overlay from bottom -- strong enough to obscure sign text in photo */
.gradient-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to top,
        rgba(10, 22, 40, 0.99) 0%,
        rgba(10, 22, 40, 0.97) 18%,
        rgba(10, 22, 40, 0.92) 30%,
        rgba(10, 22, 40, 0.75) 42%,
        rgba(10, 22, 40, 0.35) 58%,
        rgba(10, 22, 40, 0.08) 75%,
        rgba(10, 22, 40, 0.0) 100%
    );
    z-index: 1;
}

/* Top navy gradient for cohesion */
.gradient-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(
        to bottom,
        rgba(10, 22, 40, 0.6) 0%,
        rgba(10, 22, 40, 0.0) 100%
    );
    z-index: 1;
}

/* Corner anchors */
.anchor-tl {
    position: absolute;
    top: 36px;
    left: var(--pad);
    font-weight: 600;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 10;
}

.anchor-tr {
    position: absolute;
    top: 36px;
    right: var(--pad);
    font-weight: 300;
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    z-index: 10;
}

.anchor-bl {
    position: absolute;
    bottom: 36px;
    left: var(--pad);
    font-weight: 300;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    z-index: 10;
}

.anchor-br {
    position: absolute;
    bottom: 36px;
    right: var(--pad);
    font-weight: 200;
    font-size: 22px;
    color: rgba(255,255,255,0.25);
    z-index: 10;
}

/* Content area */
.content {
    position: absolute;
    bottom: 48px;
    left: var(--pad);
    right: var(--pad);
    z-index: 5;
}

/* Tag label */
.tag {
    display: inline-block;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.06em;
    color: var(--color-primary);
    margin-bottom: 16px;
    padding: 7px 18px;
    border: 1.5px solid var(--color-primary);
    border-radius: 100px;
}

/* Main title */
.title {
    font-weight: 900;
    font-size: 82px;
    line-height: 1.15;
    letter-spacing: -0.04em;
    color: var(--color-text);
    margin-bottom: 20px;
}

.title .accent {
    color: var(--color-primary);
}

/* Subtitle */
.subtitle {
    font-weight: 400;
    font-size: 28px;
    line-height: 1.5;
    color: rgba(255,255,255,0.7);
    margin-top: 20px;
}

/* Accent bar */
.accent-bar {
    width: 60px;
    height: 4px;
    background: var(--color-primary);
    margin-bottom: 16px;
    border-radius: 2px;
}

/* Watermark */
.watermark {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-weight: 900;
    font-size: 200px;
    color: rgba(255,255,255,0.03);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
    z-index: 2;
}

</style>
</head>
<body>

<div class="card">
    <!-- Background photo -->
    <img class="bg-photo" src="./images/card1_bg.png" alt="">

    <!-- Gradient overlays -->
    <div class="gradient-top"></div>
    <div class="gradient-overlay"></div>

    <!-- Watermark -->
    <div class="watermark">REFORM</div>

    <!-- Corner anchors -->
    <div class="anchor-tl">조국혁신당</div>
    <div class="anchor-tr"><span style="font-weight:600; color:rgba(255,255,255,0.6);">01</span><span style="color:rgba(255,255,255,0.3);"> / 03</span></div>
    <div class="anchor-bl">2026.03</div>
    <div class="anchor-br">+</div>

    <!-- Main content -->
    <div class="content">
        <div class="tag">정치개혁</div>
        <div class="accent-bar"></div>
        <h1 class="title">
            공천만 받으면<br>
            당선되는 구조,<br>
            <span class="accent">바꿔야 합니다</span>
        </h1>
        <p class="subtitle">조국혁신당 사무총장 이해민</p>
    </div>
</div>

</body>
