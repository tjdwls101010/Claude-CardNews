:root {
    --color-primary: #0A1628;
    --color-accent: #E8B731;
    --color-accent-light: #F5D76E;
    --color-bg: #0A1628;
    --color-surface: #132240;
    --color-text: #FFFFFF;
    --color-text-dim: #999999;
    --color-text-muted: #555555;
    --pad: 44px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    -webkit-font-smoothing: antialiased;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    word-break: keep-all;
    background: var(--color-bg);
}

/* Background photo - full bleed */
.bg-photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.75) contrast(1.1);
}

/* Top gradient for cohesion */
.gradient-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 280px;
    background: linear-gradient(to bottom,
        rgba(10, 22, 40, 0.75) 0%,
        rgba(10, 22, 40, 0.45) 40%,
        rgba(10, 22, 40, 0.0) 100%
    );
    z-index: 1;
}

/* Bottom gradient for text readability - stronger to suppress sign */
.gradient-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 850px;
    background: linear-gradient(to top,
        rgba(10, 22, 40, 0.99) 0%,
        rgba(10, 22, 40, 0.98) 12%,
        rgba(10, 22, 40, 0.96) 22%,
        rgba(10, 22, 40, 0.92) 32%,
        rgba(10, 22, 40, 0.80) 44%,
        rgba(10, 22, 40, 0.55) 58%,
        rgba(10, 22, 40, 0.25) 74%,
        rgba(10, 22, 40, 0.0) 100%
    );
    z-index: 1;
}

/* Watermark text */
.watermark {
    position: absolute;
    bottom: 180px;
    right: -20px;
    font-size: 200px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.04);
    letter-spacing: -0.05em;
    z-index: 2;
    pointer-events: none;
    user-select: none;
    line-height: 1;
}

/* Top header area */
.top-header {
    position: absolute;
    top: var(--pad);
    left: var(--pad);
    right: var(--pad);
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.party-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232, 183, 49, 0.15);
    border: 1px solid rgba(232, 183, 49, 0.4);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 18px;
    font-weight: 600;
    color: var(--color-accent);
    letter-spacing: 0.02em;
}

.party-tag .dot {
    width: 8px;
    height: 8px;
    background: var(--color-accent);
    border-radius: 50%;
}

.corner-mark-tr {
    font-size: 24px;
    font-weight: 200;
    color: rgba(255,255,255,0.25);
}

/* Main content at bottom */
.main-content {
    position: absolute;
    bottom: var(--pad);
    left: var(--pad);
    right: var(--pad);
    z-index: 5;
}

.subtitle {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
}

.title {
    font-size: 88px;
    font-weight: 800;
    color: var(--color-text);
    line-height: 1.15;
    letter-spacing: -0.04em;
    margin-bottom: 20px;
    text-shadow: 0 2px 20px rgba(10, 22, 40, 0.6);
}

.title .accent {
    color: var(--color-accent);
}

.divider {
    width: 72px;
    height: 4px;
    background: var(--color-accent);
    margin-bottom: 20px;
    border-radius: 2px;
}

.description {
    font-size: 24px;
    font-weight: 400;
    color: var(--color-text-dim);
    line-height: 1.55;
    max-width: 720px;
}

.description strong {
    color: var(--color-text);
    font-weight: 600;
}

/* Bottom bar */
.bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
}

.name-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-text);
}

.name-title span {
    font-weight: 400;
    color: var(--color-text-dim);
    margin-left: 8px;
}

.page-number {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
}
.page-number .current {
    font-weight: 600;
    color: rgba(255,255,255,0.6);
}

/* Corner anchors */
.corner-bl {
    position: absolute;
    bottom: var(--pad);
    left: var(--pad);
    z-index: 10;
}

.corner-br {
    position: absolute;
    bottom: var(--pad);
    right: var(--pad);
    z-index: 10;
}
</style>
</head>
<body>
<div class="card">
    <!-- Background photo -->
    <div class="bg-photo">
        <img src="./images/cover_photo.png" alt="">
    </div>

    <!-- Gradients -->
    <div class="gradient-top"></div>
    <div class="gradient-bottom"></div>

    <!-- Watermark -->
    <div class="watermark">REFORM</div>

    <!-- Top header -->
    <div class="top-header">
        <div class="party-tag">
            <span class="dot"></span>
            조국혁신당
        </div>
        <div class="corner-mark-tr">+</div>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="subtitle">Political Reform Now</div>
        <div class="title">지금 당장,<br><span class="accent">정치개혁</span></div>
        <div class="divider"></div>
        <div class="description">
            <strong>공천만 받으면 당선되는 구조</strong>를 바꿔<br>
            국민이 진짜 선택하는 정치를 만들겠습니다
        </div>
        <div class="bottom-bar">
            <div class="name-title">이해민<span>사무총장</span></div>
            <div class="page-number"><span class="current">01</span> / 03</div>
        </div>
    </div>
</div>
