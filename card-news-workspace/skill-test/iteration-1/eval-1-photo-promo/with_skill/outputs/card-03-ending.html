:root {
    --color-primary: #0A1628;
    --color-accent: #E8B731;
    --color-accent-light: #F5D76E;
    --color-bg: #0A1628;
    --color-surface: #132240;
    --color-text: #FFFFFF;
    --color-text-dim: #999999;
    --color-text-muted: #555555;
    --pad: 44px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Paperlogy', sans-serif;
    -webkit-font-smoothing: antialiased;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    word-break: keep-all;
    background: var(--color-bg);
}

/* Background photo - full bleed, slightly more visible */
.bg-photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.45) contrast(1.2) saturate(0.4);
}

/* Full overlay gradient - lighter to show photo more */
.gradient-full {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top,
        rgba(10, 22, 40, 0.92) 0%,
        rgba(10, 22, 40, 0.75) 18%,
        rgba(10, 22, 40, 0.50) 40%,
        rgba(10, 22, 40, 0.40) 55%,
        rgba(10, 22, 40, 0.55) 75%,
        rgba(10, 22, 40, 0.80) 100%
    );
    z-index: 1;
}

/* Watermark */
.watermark {
    position: absolute;
    top: 120px;
    right: -40px;
    font-size: 200px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.03);
    letter-spacing: -0.05em;
    z-index: 2;
    pointer-events: none;
    user-select: none;
    line-height: 1;
    white-space: nowrap;
}

.watermark2 {
    position: absolute;
    bottom: 200px;
    left: -30px;
    font-size: 180px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.025);
    letter-spacing: -0.05em;
    z-index: 2;
    pointer-events: none;
    user-select: none;
    line-height: 1;
    white-space: nowrap;
}

/* Corner anchors */
.corner-tl {
    position: absolute;
    top: var(--pad);
    left: var(--pad);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
}
.corner-tl .party-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--color-accent);
}
.corner-tl .dot {
    width: 8px;
    height: 8px;
    background: var(--color-accent);
    border-radius: 50%;
}

.corner-tr {
    position: absolute;
    top: var(--pad);
    right: var(--pad);
    z-index: 10;
    font-size: 24px;
    font-weight: 200;
    color: rgba(255,255,255,0.25);
}

.corner-bl {
    position: absolute;
    bottom: var(--pad);
    left: var(--pad);
    z-index: 10;
    font-size: 14px;
    font-weight: 300;
    color: var(--color-text-muted);
}

.corner-br {
    position: absolute;
    bottom: var(--pad);
    right: var(--pad);
    z-index: 10;
}
.page-number {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
}
.page-number .current {
    font-weight: 600;
    color: rgba(255,255,255,0.6);
}

/* Main layout - flex column from top */
.main-layout {
    position: absolute;
    top: 100px;
    left: var(--pad);
    right: var(--pad);
    bottom: 90px;
    z-index: 5;
    display: flex;
    flex-direction: column;
}

/* Top section label */
.section-label {
    font-size: 17px;
    font-weight: 500;
    color: var(--color-accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
}

.accent-bar {
    width: 56px;
    height: 5px;
    background: var(--color-accent);
    border-radius: 3px;
    margin-bottom: 20px;
}

.top-title {
    font-size: 48px;
    font-weight: 800;
    color: var(--color-text);
    line-height: 1.2;
    letter-spacing: -0.03em;
    margin-bottom: 32px;
}
.top-title .accent {
    color: var(--color-accent);
}

/* Quote section - glassmorphism panel */
.quote-panel {
    background: rgba(19, 34, 64, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 40px 44px;
    margin-bottom: 28px;
    position: relative;
}

.quote-mark-open {
    font-size: 80px;
    font-weight: 200;
    color: var(--color-accent);
    line-height: 0.5;
    margin-bottom: 16px;
    opacity: 0.4;
}

.quote-text {
    font-size: 36px;
    font-weight: 700;
    color: var(--color-text);
    line-height: 1.5;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
}

.quote-text .accent {
    color: var(--color-accent);
    font-weight: 800;
}

.quote-text .dim {
    color: var(--color-text-dim);
    font-weight: 400;
}

.quote-mark-close {
    font-size: 80px;
    font-weight: 200;
    color: var(--color-accent);
    line-height: 0.3;
    opacity: 0.4;
    text-align: right;
}

/* Attribution row */
.attribution-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.attr-divider {
    width: 48px;
    height: 3px;
    background: var(--color-accent);
    border-radius: 2px;
}

.attr-name {
    font-size: 26px;
    font-weight: 700;
    color: var(--color-text);
}

.attr-role {
    font-size: 20px;
    font-weight: 400;
    color: var(--color-text-dim);
}

/* Bottom reform goals */
.reform-goals {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.goal-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-accent);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    text-transform: uppercase;
}

.goal-items {
    display: flex;
    gap: 14px;
}

.goal-item {
    flex: 1;
    background: rgba(232, 183, 49, 0.06);
    border: 1px solid rgba(232, 183, 49, 0.2);
    border-radius: 10px;
    padding: 18px 16px;
    text-align: center;
}

.goal-item .goal-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.8;
}

.goal-item .goal-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--color-text);
    line-height: 1.35;
}

.goal-item .goal-sub {
    font-size: 14px;
    font-weight: 400;
    color: var(--color-text-dim);
    margin-top: 4px;
    line-height: 1.3;
}

/* CTA */
.cta-box {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(232, 183, 49, 0.12);
    border: 1px solid rgba(232, 183, 49, 0.35);
    border-radius: 8px;
    padding: 16px 32px;
    margin-top: 20px;
}

.cta-box .cta-text {
    font-size: 22px;
    font-weight: 600;
    color: var(--color-accent);
    letter-spacing: 0.03em;
}

.cta-box .cta-arrow {
    font-size: 22px;
    color: var(--color-accent);
}
</style>
</head>
<body>
<div class="card">
    <!-- Background photo -->
    <div class="bg-photo">
        <img src="./images/ending_photo.png" alt="">
    </div>

    <!-- Gradient overlay -->
    <div class="gradient-full"></div>

    <!-- Watermarks -->
    <div class="watermark">REFORM</div>
    <div class="watermark2">PEOPLE</div>

    <!-- Corner anchors -->
    <div class="corner-tl">
        <span class="dot"></span>
        <span class="party-name">조국혁신당</span>
    </div>
    <div class="corner-tr">+</div>
    <div class="corner-bl">2026 지방선거 정치개혁</div>
    <div class="corner-br">
        <div class="page-number"><span class="current">03</span> / 03</div>
    </div>

    <!-- Main layout -->
    <div class="main-layout">
        <div class="accent-bar"></div>
        <div class="section-label">Our Promise</div>
        <div class="top-title">정치개혁,<br><span class="accent">끝까지</span> 함께하겠습니다</div>

        <!-- Quote panel -->
        <div class="quote-panel">
            <div class="quote-mark-open">"</div>
            <div class="quote-text">
                <span class="dim">정치개혁은 더 이상 미룰 수 없는</span><br>
                <span class="accent">국민의 명령</span>입니다<br>
                <span class="dim">빛의 혁명으로 민주주의를 지켜낸</span><br>
                <span class="accent">광장의 목소리</span>와 함께하겠습니다
            </div>
            <div class="quote-mark-close">"</div>
        </div>

        <!-- Attribution -->
        <div class="attribution-row">
            <div class="attr-divider"></div>
            <div class="attr-name">이해민</div>
            <div class="attr-role">조국혁신당 사무총장</div>
        </div>

        <!-- Bottom reform goals -->
        <div class="reform-goals">
            <div class="goal-label">Reform Agenda</div>
            <div class="goal-items">
                <div class="goal-item">
                    <div class="goal-text">중대선거구제<br>도입</div>
                    <div class="goal-sub">양당 독점 해소</div>
                </div>
                <div class="goal-item">
                    <div class="goal-text">비례대표<br>정수 확대</div>
                    <div class="goal-sub">국민 뜻 반영</div>
                </div>
                <div class="goal-item">
                    <div class="goal-text">결선투표제<br>도입</div>
                    <div class="goal-sub">진짜 민주주의</div>
                </div>
            </div>

            <div class="cta-box">
                <span class="cta-text">개혁의 여정에 힘을 보태주십시오</span>
                <span class="cta-arrow">&rarr;</span>
            </div>
        </div>
    </div>
</div>
