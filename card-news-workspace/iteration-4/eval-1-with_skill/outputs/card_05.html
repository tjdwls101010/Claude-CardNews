*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; font-family: 'Paperlogy', sans-serif; }

:root {
    --bg: #0B1120;
    --primary: #0ff4f4;
    --accent: #00D4AA;
    --neutral: #1A2340;
    --text: #FFFFFF;
    --dim: #6B7A99;
    --pad: 50px;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    word-break: keep-all;
}

.bg-gradient {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
        radial-gradient(ellipse at 50% 35%, rgba(15, 244, 244, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 30% 70%, rgba(0, 212, 170, 0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 80%, rgba(15, 244, 244, 0.05) 0%, transparent 35%),
        linear-gradient(180deg, #0B1120 0%, #0D1A2F 50%, #0B1120 100%);
    z-index: 0;
}

.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 200px;
    color: rgba(255, 255, 255, 0.025);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
}

.progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    z-index: 10;
    width: 100%;
}

.anchor-tl {
    position: absolute;
    top: 36px; left: var(--pad);
    font-weight: 600;
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    z-index: 10;
    letter-spacing: 0.05em;
}
.anchor-tr {
    position: absolute;
    top: 36px; right: var(--pad);
    font-weight: 300;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    z-index: 10;
}

.content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px var(--pad) 70px var(--pad);
}

/* Illustration */
.illustration-wrap {
    margin-top: 10px;
    margin-bottom: 20px;
    flex-shrink: 0;
}
.illustration-wrap img {
    width: 360px;
    height: 360px;
    object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(15, 244, 244, 0.25)) drop-shadow(0 0 80px rgba(0,212,170,0.15));
}

/* Summary grid */
.summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    margin-bottom: 28px;
}
.summary-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 24px 20px;
    text-align: center;
    backdrop-filter: blur(8px);
}
.summary-item .si-num {
    font-weight: 800;
    font-size: 36px;
    color: var(--primary);
    margin-bottom: 8px;
    letter-spacing: -0.03em;
}
.summary-item .si-title {
    font-weight: 700;
    font-size: 22px;
    color: #FFFFFF;
    margin-bottom: 6px;
}
.summary-item .si-desc {
    font-weight: 400;
    font-size: 17px;
    color: rgba(255,255,255,0.5);
    line-height: 1.4;
}

/* Divider */
.divider-line {
    width: 60px;
    height: 2px;
    background: rgba(15, 244, 244, 0.4);
    margin-bottom: 28px;
}

/* Vision statement */
.vision {
    text-align: center;
    margin-bottom: 24px;
}
.vision .quote-mark {
    font-weight: 100;
    font-size: 80px;
    line-height: 1;
    color: rgba(15, 244, 244, 0.2);
    margin-bottom: -10px;
}
.vision .vision-text {
    font-weight: 300;
    font-size: 36px;
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
    max-width: 800px;
}
.vision .vision-text strong {
    font-weight: 700;
    color: #FFFFFF;
}
.vision .vision-text .hl {
    color: var(--primary);
    font-weight: 700;
}

/* Key takeaway pills */
.takeaway-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
}
.pill {
    background: rgba(15, 244, 244, 0.08);
    border: 1px solid rgba(15, 244, 244, 0.2);
    border-radius: 100px;
    padding: 10px 24px;
    font-weight: 600;
    font-size: 18px;
    color: var(--primary);
    letter-spacing: 0.02em;
}

/* Brand footer */
.brand-footer {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 300;
    font-size: 16px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.1em;
    z-index: 10;
}

/* Decorative circles */
.deco-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(15, 244, 244, 0.08);
    z-index: 0;
    pointer-events: none;
}
.deco-circle.c1 { width: 300px; height: 300px; top: -60px; right: -80px; }
.deco-circle.c2 { width: 200px; height: 200px; bottom: 100px; left: -60px; }
.deco-circle.c3 { width: 120px; height: 120px; bottom: 200px; right: 60px; }

.corner-mark {
    position: absolute;
    width: 24px; height: 24px;
    z-index: 10;
}
.corner-mark.bl { bottom: 36px; left: var(--pad); border-left: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); }
.corner-mark.br { bottom: 36px; right: var(--pad); border-right: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); }

.deco-dots {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}
.deco-dots .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
}
.deco-dots .dot.active {
    width: 28px;
    border-radius: 4px;
    background: var(--primary);
}
</style>

<div class="card">
    <div class="bg-gradient"></div>
    <div class="watermark">FUTURE</div>
    <div class="progress-bar"></div>

    <!-- Decorative circles -->
    <div class="deco-circle c1"></div>
    <div class="deco-circle c2"></div>
    <div class="deco-circle c3"></div>

    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600;color:rgba(255,255,255,0.7);">05</span> <span style="color:rgba(255,255,255,0.3);">/ 05</span></div>

    <div class="content">
        <div class="illustration-wrap">
            <img src="./images/card5_illust.png" alt="Robot reaching for star">
        </div>

        <div class="summary-grid">
            <div class="summary-item">
                <div class="si-num">01</div>
                <div class="si-title">패턴 인식</div>
                <div class="si-desc">AI는 데이터에서 규칙을 찾는다</div>
            </div>
            <div class="summary-item">
                <div class="si-num">02</div>
                <div class="si-title">반복 학습</div>
                <div class="si-desc">시행착오를 통해 점점 정확해진다</div>
            </div>
            <div class="summary-item">
                <div class="si-num">03</div>
                <div class="si-title">일상 속 AI</div>
                <div class="si-desc">이미 우리 생활 깊이 들어와 있다</div>
            </div>
        </div>

        <div class="divider-line"></div>

        <div class="vision">
            <div class="quote-mark">"</div>
            <p class="vision-text">
                AI를 <span class="hl">이해</span>하면<br>
                <strong>미래</strong>가 보인다
            </p>
        </div>

        <div class="takeaway-row">
            <div class="pill"># 패턴읽기</div>
            <div class="pill"># 데이터학습</div>
            <div class="pill"># 시행착오</div>
            <div class="pill"># 일상속AI</div>
        </div>
    </div>

    <div class="deco-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
    </div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>
    <div class="brand-footer">AI EXPLAINED SERIES</div>
</div>
</body>
