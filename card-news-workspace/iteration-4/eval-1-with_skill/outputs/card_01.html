*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; font-family: 'Paperlogy', sans-serif; }

:root {
    --bg: #0B1120;
    --primary: #0ff4f4;
    --accent: #00D4AA;
    --neutral: #1A2340;
    --text: #FFFFFF;
    --dim: #6B7A99;
    --pad: 50px;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    word-break: keep-all;
}

/* Background gradient layers */
.bg-gradient {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
        radial-gradient(ellipse at 50% 30%, rgba(0, 212, 170, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(15, 244, 244, 0.08) 0%, transparent 50%),
        linear-gradient(180deg, #0B1120 0%, #0D1A2F 50%, #0B1120 100%);
    z-index: 0;
}

/* Watermark */
.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 220px;
    color: rgba(255, 255, 255, 0.03);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
}

/* Corner anchors */
.anchor-tl {
    position: absolute;
    top: 36px; left: var(--pad);
    font-weight: 600;
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    z-index: 10;
    letter-spacing: 0.05em;
}
.anchor-tr {
    position: absolute;
    top: 36px; right: var(--pad);
    font-weight: 300;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    z-index: 10;
}

/* Progress bar */
.progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    z-index: 10;
    width: 20%;
}

/* Main content */
.content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--pad);
}

/* Illustration */
.illustration {
    width: 580px;
    height: 580px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 40px rgba(15, 244, 244, 0.25)) drop-shadow(0 0 80px rgba(0, 212, 170, 0.15));
}
.illustration img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* Tag */
.tag {
    display: inline-block;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: var(--primary);
    padding: 8px 20px;
    border: 1px solid rgba(15, 244, 244, 0.4);
    border-radius: 100px;
    margin-bottom: 24px;
    background: rgba(15, 244, 244, 0.06);
}

/* Title */
.title {
    font-weight: 900;
    font-size: 76px;
    line-height: 1.15;
    letter-spacing: -0.04em;
    text-align: center;
    color: #FFFFFF;
    margin-bottom: 20px;
}
.title .highlight {
    color: var(--primary);
    position: relative;
}

/* Subtitle */
.subtitle {
    font-weight: 400;
    font-size: 26px;
    line-height: 1.5;
    color: rgba(255,255,255,0.6);
    text-align: center;
    max-width: 700px;
}

/* Decorative dots */
.deco-dots {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}
.deco-dots .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
}
.deco-dots .dot.active {
    width: 28px;
    border-radius: 4px;
    background: var(--primary);
}

/* Decorative corner marks */
.corner-mark {
    position: absolute;
    width: 24px; height: 24px;
    z-index: 10;
}
.corner-mark.bl { bottom: 36px; left: var(--pad); border-left: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); }
.corner-mark.br { bottom: 36px; right: var(--pad); border-right: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="card">
    <div class="bg-gradient"></div>
    <div class="watermark">AI</div>
    <div class="progress-bar"></div>

    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600;color:rgba(255,255,255,0.7);">01</span> <span style="color:rgba(255,255,255,0.3);">/ 05</span></div>

    <div class="content">
        <div class="illustration">
            <img src="./images/card1_v1.png" alt="AI Robot Character">
        </div>
        <div class="tag">AI BASICS</div>
        <div class="title">AI는 <span class="highlight">생각</span>하지 않는다<br><span class="highlight">패턴</span>을 읽는다</div>
        <div class="subtitle">누구나 이해할 수 있는 AI 작동 원리 5분 가이드</div>
    </div>

    <div class="deco-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>
</div>
</body>
