*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; font-family: 'Paperlogy', sans-serif; }

:root {
    --bg: #0B1120;
    --primary: #0ff4f4;
    --accent: #00D4AA;
    --neutral: #1A2340;
    --text: #FFFFFF;
    --dim: #6B7A99;
    --pad: 50px;
}

.card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    word-break: keep-all;
}

.bg-gradient {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
        radial-gradient(ellipse at 60% 40%, rgba(15, 244, 244, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(0, 212, 170, 0.08) 0%, transparent 40%),
        linear-gradient(180deg, #0B1120 0%, #0D1A2F 100%);
    z-index: 0;
}

.watermark {
    position: absolute;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-8deg);
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 180px;
    color: rgba(255, 255, 255, 0.025);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.03em;
}

.progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    z-index: 10;
    width: 60%;
}

.anchor-tl {
    position: absolute;
    top: 36px; left: var(--pad);
    font-weight: 600;
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    z-index: 10;
    letter-spacing: 0.05em;
}
.anchor-tr {
    position: absolute;
    top: 36px; right: var(--pad);
    font-weight: 300;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    z-index: 10;
}

.card-num {
    font-weight: 900;
    font-size: 120px;
    color: rgba(15, 244, 244, 0.08);
    position: absolute;
    top: 70px;
    right: var(--pad);
    z-index: 1;
    line-height: 1;
    letter-spacing: -0.05em;
}

.content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    padding: 90px var(--pad) 70px var(--pad);
    gap: 0;
}

/* Title area spans full width */
.title-area {
    grid-column: 1 / -1;
    margin-bottom: 20px;
}
.title-area .divider {
    width: 50px;
    height: 3px;
    background: var(--primary);
    margin-bottom: 20px;
}
.title-area h2 {
    font-weight: 800;
    font-size: 50px;
    line-height: 1.2;
    letter-spacing: -0.04em;
}
.title-area h2 .hl {
    color: var(--primary);
}

/* Left - illustration */
.illust-area {
    display: flex;
    align-items: center;
    justify-content: center;
}
.illust-area img {
    width: 400px;
    height: 400px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(15, 244, 244, 0.2)) drop-shadow(0 0 60px rgba(0,212,170,0.1));
}

/* Right - steps */
.steps-area {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
    padding-left: 10px;
}
.step-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 22px 24px;
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
}
.step-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 3px;
    height: 100%;
    background: var(--primary);
    opacity: 0.6;
}
.step-item .step-num {
    font-weight: 700;
    font-size: 14px;
    color: var(--primary);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
}
.step-item .step-title {
    font-weight: 700;
    font-size: 22px;
    color: #FFFFFF;
    margin-bottom: 4px;
}
.step-item .step-desc {
    font-weight: 400;
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    line-height: 1.4;
}

/* Analogy bar at bottom */
.analogy-bar {
    grid-column: 1 / -1;
    background: rgba(15, 244, 244, 0.06);
    border: 1px solid rgba(15, 244, 244, 0.15);
    border-radius: 20px;
    padding: 24px 32px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
}
.analogy-bar .analogy-icon {
    font-size: 36px;
    flex-shrink: 0;
}
.analogy-bar .analogy-text {
    font-weight: 500;
    font-size: 22px;
    color: rgba(255,255,255,0.8);
    line-height: 1.5;
}
.analogy-bar .analogy-text .hl {
    color: var(--primary);
    font-weight: 700;
}

.deco-dots {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}
.deco-dots .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
}
.deco-dots .dot.active {
    width: 28px;
    border-radius: 4px;
    background: var(--primary);
}

.corner-mark {
    position: absolute;
    width: 24px; height: 24px;
    z-index: 10;
}
.corner-mark.bl { bottom: 36px; left: var(--pad); border-left: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); }
.corner-mark.br { bottom: 36px; right: var(--pad); border-right: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="card">
    <div class="bg-gradient"></div>
    <div class="watermark">LEARN</div>
    <div class="progress-bar"></div>
    <div class="card-num">03</div>

    <div class="anchor-tl">AI EXPLAINED</div>
    <div class="anchor-tr"><span style="font-weight:600;color:rgba(255,255,255,0.7);">03</span> <span style="color:rgba(255,255,255,0.3);">/ 05</span></div>

    <div class="content">
        <div class="title-area">
            <div class="divider"></div>
            <h2>수천 번의 <span class="hl">시행착오</span>가<br>AI를 똑똑하게 만든다</h2>
        </div>

        <div class="illust-area">
            <img src="./images/card3_illust.png" alt="Robot juggling">
        </div>

        <div class="steps-area">
            <div class="step-item">
                <div class="step-num">ROUND 1</div>
                <div class="step-title">처음엔 찍기</div>
                <div class="step-desc">아무것도 모르니까 무작위로 답한다</div>
            </div>
            <div class="step-item">
                <div class="step-num">ROUND 100</div>
                <div class="step-title">틀리면 고치기</div>
                <div class="step-desc">오답을 확인하고 방법을 조금씩 수정</div>
            </div>
            <div class="step-item">
                <div class="step-num">ROUND 10,000</div>
                <div class="step-title">점점 정확해진다</div>
                <div class="step-desc">반복할수록 정답률이 올라간다</div>
            </div>
            <div class="step-item">
                <div class="step-num">RESULT</div>
                <div class="step-title">전문가 수준 도달</div>
                <div class="step-desc">충분히 반복하면 사람만큼 잘한다</div>
            </div>
        </div>

        <div class="analogy-bar">
            <div class="analogy-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="16" stroke="#0ff4f4" stroke-width="2" fill="rgba(15,244,244,0.1)"/>
                    <path d="M12 18l4 4 8-8" stroke="#0ff4f4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="analogy-text">
                마치 <span class="hl">자전거 배우기</span>와 같다 - 넘어지고, 고치고, 반복하면 결국 탄다
            </div>
        </div>
    </div>

    <div class="deco-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>
</div>
</body>
