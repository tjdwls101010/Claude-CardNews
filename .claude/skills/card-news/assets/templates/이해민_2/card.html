<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="card">
    <!-- Top Section -->
    <div class="top-section">
      <img class="bg-image" src="./image.png" alt="">
      <div class="blue-overlay"></div>
      <img class="cutout-person" src="./photo_cutout.png" alt="">
      <div class="cutout-fade"></div>
      <div class="top-text">
        <div class="handwriting">이해민 의원 대표발의</div>
        <div class="headline">
          <span class="line1">헌법재판소법</span>
          <span class="line2">국회 본회의</span>
          <span class="line3">통과!</span>
        </div>
      </div>
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section">
      <div class="body-text">
        마침내 통과된 '<span class="bold">재판소원제</span>'<br>
        이제 국민 누구나 위헌적인 판결에<br>
        이의를 제기할 수 있습니다
      </div>
      <div class="body-text">
        사법부의 성역을 허물고<br>
        국민의 기본권을 지키는 거대한 진전입니다
      </div>
      <div class="quote">
        권력 위에 헌법을,<br>
        헌법 위에 국민을 두는 나라!<br>
        대한민국을 향해 나아가겠습니다
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-bar">
      <img class="footer-logo" src="./logo.png" alt="조국혁신당">
      <span class="footer-name">국회의원 이해민</span>
    </div>
  </div>
</body>
</html>
