<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="./style.css">

<body>
  <div class="card">

      <img src="./bg_motion_blur.jpg" alt="">

      <div class="info-bars">

        </div>
        <div class="info-bar">
          <span>국회의사당 <span class="light">본청 앞</span> 계단</span>
        </div>
      </div>

    <div class="bottom-bar">
