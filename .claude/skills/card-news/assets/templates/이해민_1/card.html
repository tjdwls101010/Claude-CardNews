<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Paperlogy';
    src: url('../../fonts/Paperlogy-9Black.ttf') format('truetype');
    font-weight: 900;
  }
  @font-face {
    font-family: 'Paperlogy';
    src: url('../../fonts/Paperlogy-8ExtraBold.ttf') format('truetype');
    font-weight: 800;
  }
  @font-face {
    font-family: 'Paperlogy';
    src: url('../../fonts/Paperlogy-7Bold.ttf') format('truetype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Paperlogy';
    src: url('../../fonts/Paperlogy-5Medium.ttf') format('truetype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'Paperlogy';
    src: url('../../fonts/Paperlogy-4Regular.ttf') format('truetype');
    font-weight: 400;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    position: relative;
  }

  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }

  /* z-1: 모션블러 배경 */
  .bg-blur {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .bg-blur img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* z-2: 어두운 그라디언트 오버레이 */
  .dark-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    background: linear-gradient(to top,
      rgba(0, 0, 0, 0.75) 0%,
      rgba(0, 0, 0, 0.5) 30%,
      rgba(0, 0, 0, 0.25) 50%,
      rgba(0, 0, 0, 0.1) 70%,
      rgba(0, 0, 0, 0.05) 100%
    );
  }

  /* z-3: 인물 컷아웃 (Depth Sandwich) */
  .cutout-person {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-52%);
    width: 62%;
    height: auto;
    z-index: 3;
    pointer-events: none;
    filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.3));
  }

  /* z-4: 컷아웃 위 하단 그라디언트 */
  .cutout-gradient {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 4;
    pointer-events: none;
    background: linear-gradient(to top,
      rgba(0, 0, 0, 0.9) 0%,
      rgba(0, 0, 0, 0.6) 8%,
      rgba(0, 0, 0, 0.2) 18%,
      rgba(0, 0, 0, 0.0) 30%
    );
  }

  /* z-5: 텍스트 콘텐츠 */
  .text-content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 48px;
  }

  .logo {
    width: 160px;
    height: auto;
    margin-bottom: 20px;
  }

  .subtitle {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 500;
    font-size: 36px;
    color: #ffffff;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 1px;
    word-break: keep-all;
  }

  .main-title {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 120px;
    color: rgba(255, 255, 255, 0.95);
    text-align: center;
    letter-spacing: 8px;
    line-height: 1.15;
    word-break: keep-all;
    margin-bottom: 4px;
    text-shadow:
      0 -1px 0 rgba(255, 255, 255, 0.5),
      0 2px 0 rgba(180, 175, 170, 0.6),
      0 4px 0 rgba(150, 145, 140, 0.5),
      0 6px 0 rgba(120, 115, 110, 0.4),
      0 8px 0 rgba(90, 85, 80, 0.3),
      0 12px 20px rgba(0, 0, 0, 0.5),
      0 20px 40px rgba(0, 0, 0, 0.25);
  }

  .tent-protest {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .tent-protest .emoji {
    font-size: 72px;
    line-height: 1;
  }

  .tent-protest .text-3d {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 900;
    font-size: 80px;
    color: rgba(255, 255, 255, 0.95);
    letter-spacing: 6px;
    text-shadow:
      0 -1px 0 rgba(255, 255, 255, 0.4),
      0 2px 0 rgba(160, 155, 150, 0.5),
      0 4px 0 rgba(120, 115, 110, 0.4),
      0 6px 0 rgba(80, 75, 70, 0.3),
      0 8px 15px rgba(0, 0, 0, 0.4);
  }

  .info-bars {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .info-bar {
    background: #1a56b0;
    padding: 12px 36px;
    text-align: center;
  }

  .info-bar span {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 700;
    font-size: 36px;
    color: #ffffff;
    letter-spacing: 1px;
    word-break: keep-all;
  }

  .info-bar .light {
    font-weight: 400;
  }

  /* z-6: 하단 바 */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.85);
    padding: 22px 0;
    text-align: center;
    z-index: 6;
  }

  .bottom-bar span {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #ffffff;
    letter-spacing: 3px;
  }

  .bottom-bar .name {
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="bg-blur">
      <img src="./bg_motion_blur.jpg" alt="">
    </div>
    <div class="dark-overlay"></div>
    <img class="cutout-person" src="./photo_cutout.png" alt="">
    <div class="cutout-gradient"></div>

    <div class="text-content">
      <img class="logo" src="./logo.png" alt="조국혁신당">
      <div class="subtitle">"함께 힘을 보태주세요"</div>
      <div class="main-title">정치개혁 광장</div>
      <div class="tent-protest">
        <span class="emoji">🔥</span>
        <span class="text-3d">천막 농성</span>
        <span class="emoji">🔥</span>
      </div>
      <div class="info-bars">
        <div class="info-bar">
          <span>3월 20일 (금) 11시-14시</span>
        </div>
        <div class="info-bar">
          <span>국회의사당 <span class="light">본청 앞</span> 계단</span>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <span>조국혁신당 사무총장 <span class="name">이해민</span></span>
    </div>
  </div>
</body>
</html>
