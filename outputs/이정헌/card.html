<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Paperlogy';
    src: url('/Users/seongjin/Documents/Seongjin_Claude/Design/.claude/skills/card-news/assets/fonts/Paperlogy-8ExtraBold.ttf') format('truetype');
    font-weight: 800;
  }
  @font-face {
    font-family: 'Paperlogy';
    src: url('/Users/seongjin/Documents/Seongjin_Claude/Design/.claude/skills/card-news/assets/fonts/Paperlogy-5Medium.ttf') format('truetype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'Paperlogy';
    src: url('/Users/seongjin/Documents/Seongjin_Claude/Design/.claude/skills/card-news/assets/fonts/Paperlogy-4Regular.ttf') format('truetype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Yeonwoo';
    src: url('/Users/seongjin/Documents/Seongjin_Claude/Design/.claude/skills/card-news/assets/fonts/그리운 사막의 연우체.ttf') format('truetype');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    position: relative;
  }

  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }

  .bg-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }

  .gradient-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to top,
      rgba(0, 0, 0, 0.78) 0%,
      rgba(0, 0, 0, 0.55) 30%,
      rgba(0, 0, 0, 0.2) 55%,
      rgba(0, 0, 0, 0.0) 70%
    );
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 68px 68px 68px;
  }

  .logo {
    width: 120px;
    height: auto;
    margin-bottom: 14px;
    display: block;
  }

  .main-text {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 800;
    font-size:70px;
    line-height: 1.35;
    color: #ffffff;
    word-break: keep-all;
    margin-bottom: 44px;
    letter-spacing: -0.5px;
  }

  .info-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .info-text {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .info-text span {
    font-family: 'Paperlogy', sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.5px;
  }

  .signature {
    font-family: 'Yeonwoo', cursive;
    font-size: 72px;
    color: #ffffff;
    letter-spacing: 14px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="bg-photo" src="photo_final.jpg" alt="">
    <div class="gradient-overlay"></div>
    <div class="content">
      <img class="logo" src="/Users/seongjin/Documents/Seongjin_Claude/Design/.claude/skills/card-news/assets/templates/로고_더불어민주당/white.png" alt="더불어민주당">
      <h1 class="main-text">약자의 눈으로<br>해법을 모색했습니다</h1>
      <div class="info-row">
        <div class="info-text">
          <span>2026.03.19.(목)</span>
          <span>서울 광진구갑 국회의원</span>
        </div>
        <div class="signature">이정헌</div>
      </div>
    </div>
  </div>
</body>
</html>
